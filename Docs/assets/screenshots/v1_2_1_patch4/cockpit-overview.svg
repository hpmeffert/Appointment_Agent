<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Appointment Agent cockpit overview screenshot</title>
  <desc id="desc">Annotated overview of the dashboard, operator panel, monitoring pages, and Google demo control area.</desc>
  <rect width="1280" height="760" fill="#edf2f7"/>
  <rect x="0" y="0" width="1280" height="88" fill="#0b1624"/>
  <text x="40" y="40" fill="#f5f9ff" font-family="IBM Plex Sans, Arial, sans-serif" font-size="28" font-weight="700">Appointment Agent Cockpit v1.2.1-patch2</text>
  <text x="40" y="68" fill="#c6d3e6" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">Dashboard, Message Monitor, Reports, Monitoring, Settings, Google Demo Control, Help</text>
  <rect x="40" y="120" width="1200" height="120" rx="28" fill="#153e75"/>
  <text x="72" y="168" fill="#ffffff" font-family="IBM Plex Sans, Arial, sans-serif" font-size="34" font-weight="700">Incident-style operator shell</text>
  <text x="72" y="204" fill="#d7e4f4" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">The same visual language stays stable while the operator moves from booking, to monitoring, to settings.</text>
  <rect x="40" y="270" width="350" height="430" rx="24" fill="#f8fafc" stroke="#d8e0ec"/>
  <text x="68" y="316" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="26" font-weight="700">Operator Panel</text>
  <rect x="68" y="346" width="124" height="46" rx="14" fill="#5d6878" stroke="#44515f"/>
  <rect x="204" y="346" width="146" height="46" rx="14" fill="#0f4c81" stroke="#153e75"/>
  <text x="91" y="375" fill="#f8fbff" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">Demo</text>
  <text x="236" y="375" fill="#ffffff" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">Monitoring</text>
  <rect x="68" y="420" width="286" height="110" rx="18" fill="#ffffff" stroke="#d8e0ec"/>
  <text x="88" y="452" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">Current Story</text>
  <text x="88" y="482" fill="#5f6d83" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">Booking, rescheduling, cancellation, callback, and slot hold are shown as operator-friendly story cards.</text>
  <rect x="68" y="552" width="286" height="118" rx="18" fill="#ffffff" stroke="#d8e0ec"/>
  <text x="88" y="584" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">Operator Summary</text>
  <text x="88" y="614" fill="#5f6d83" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">One place for journey id, correlation id, selected action, selected slot, and hold status.</text>
  <rect x="420" y="270" width="400" height="430" rx="24" fill="#f8fafc" stroke="#d8e0ec"/>
  <text x="448" y="316" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="26" font-weight="700">Message Monitor</text>
  <rect x="448" y="344" width="344" height="86" rx="18" fill="#ffffff" stroke="#d8e0ec"/>
  <rect x="448" y="444" width="344" height="86" rx="18" fill="#ffffff" stroke="#d8e0ec"/>
  <rect x="448" y="544" width="344" height="126" rx="18" fill="#ffffff" stroke="#d8e0ec"/>
  <text x="470" y="376" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" font-weight="700">Outbound reminder message</text>
  <text x="470" y="404" fill="#5f6d83" font-family="IBM Plex Sans, Arial, sans-serif" font-size="15">RCS or SMS status is normalized into one monitor view.</text>
  <text x="470" y="476" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" font-weight="700">Inbound reply</text>
  <text x="470" y="504" fill="#5f6d83" font-family="IBM Plex Sans, Arial, sans-serif" font-size="15">The same page shows customer replies and delivery updates.</text>
  <text x="470" y="576" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" font-weight="700">Communications Reports</text>
  <text x="470" y="604" fill="#5f6d83" font-family="IBM Plex Sans, Arial, sans-serif" font-size="15">High-level cards summarize success, fallback, and operator relevance.</text>
  <rect x="850" y="270" width="390" height="430" rx="24" fill="#f8fafc" stroke="#d8e0ec"/>
  <text x="878" y="316" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="26" font-weight="700">Google Demo Control</text>
  <rect x="878" y="344" width="160" height="46" rx="14" fill="#5d6878" stroke="#44515f"/>
  <rect x="1050" y="344" width="160" height="46" rx="14" fill="#5d6878" stroke="#44515f"/>
  <text x="930" y="374" fill="#f8fbff" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">Simulation</text>
  <text x="1110" y="374" fill="#f8fbff" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">Test</text>
  <rect x="878" y="416" width="332" height="84" rx="18" fill="#ffffff" stroke="#d8e0ec"/>
  <rect x="878" y="516" width="332" height="84" rx="18" fill="#ffffff" stroke="#d8e0ec"/>
  <rect x="878" y="616" width="332" height="54" rx="18" fill="#ffffff" stroke="#d8e0ec"/>
  <text x="900" y="450" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" font-weight="700">Date range + appointment type</text>
  <text x="900" y="478" fill="#5f6d83" font-family="IBM Plex Sans, Arial, sans-serif" font-size="15">Operators can prepare realistic calendar data for the right business vertical.</text>
  <text x="900" y="550" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" font-weight="700">Prepare, generate, delete, reset</text>
  <text x="900" y="578" fill="#5f6d83" font-family="IBM Plex Sans, Arial, sans-serif" font-size="15">Clear actions for preview-only mode and live Google test calendar writes.</text>
  <text x="900" y="649" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">Patch 2 focus: readable day-mode buttons and stronger onboarding docs.</text>
</svg>
