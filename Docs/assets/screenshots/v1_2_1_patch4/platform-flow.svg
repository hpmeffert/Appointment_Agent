<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Platform flow overview</title>
  <desc id="desc">A simple platform flow from channels through LEKAB and the service bus to orchestration and booking adapters.</desc>
  <rect width="1280" height="420" fill="#edf2f7"/>
  <text x="60" y="62" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="34" font-weight="700">How the Platform Works</text>
  <text x="60" y="98" fill="#5f6d83" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">Patch 3 makes the platform layers visible directly in the cockpit and in the docs.</text>
  <rect x="60" y="150" width="190" height="120" rx="24" fill="#ffffff" stroke="#d8e0ec"/>
  <rect x="290" y="150" width="210" height="120" rx="24" fill="#ffffff" stroke="#d8e0ec"/>
  <rect x="540" y="150" width="210" height="120" rx="24" fill="#ffffff" stroke="#d8e0ec"/>
  <rect x="790" y="150" width="210" height="120" rx="24" fill="#ffffff" stroke="#d8e0ec"/>
  <rect x="1040" y="150" width="180" height="120" rx="24" fill="#ffffff" stroke="#d8e0ec"/>
  <text x="92" y="192" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">Channels</text>
  <text x="92" y="224" fill="#5f6d83" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">RCS, SMS, chat, later voice</text>
  <text x="322" y="192" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">LEKAB Adapter</text>
  <text x="322" y="224" fill="#5f6d83" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">Normalizes outbound and inbound messaging</text>
  <text x="572" y="192" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">Service Bus</text>
  <text x="572" y="224" fill="#5f6d83" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">Keeps modules loosely coupled</text>
  <text x="822" y="192" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">Orchestrator</text>
  <text x="822" y="224" fill="#5f6d83" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">Decides next journey action</text>
  <text x="1072" y="192" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">Adapters</text>
  <text x="1072" y="224" fill="#5f6d83" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">Google today, more later</text>
  <path d="M250 210 H290" stroke="#0f4c81" stroke-width="8" stroke-linecap="round"/>
  <path d="M500 210 H540" stroke="#0f4c81" stroke-width="8" stroke-linecap="round"/>
  <path d="M750 210 H790" stroke="#0f4c81" stroke-width="8" stroke-linecap="round"/>
  <path d="M1000 210 H1040" stroke="#0f4c81" stroke-width="8" stroke-linecap="round"/>
  <text x="60" y="340" fill="#132033" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" font-weight="700">Why this matters</text>
  <text x="60" y="370" fill="#5f6d83" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">A company can swap or extend adapters without rebuilding the full UI or retraining operators on a new shell.</text>
</svg>
